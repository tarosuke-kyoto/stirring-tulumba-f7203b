<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WindView Clone</title>

<style>
body {
  margin: 0;
  background: #000;
  color: white;
  font-family: Arial;
}

header {
  text-align: center;
  padding: 8px;
  background: #111;
  font-size: 16px;
}

textarea {
  width: 100%;
  height: 120px;
  background: #111;
  color: white;
  border: none;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  background: #222;
  color: white;
  border: none;
  font-size: 16px;
}

#history {
  display: flex;
  overflow-x: auto;
  background: #111;
}

.history-item {
  padding: 8px;
  border-right: 1px solid #333;
  cursor: pointer;
  white-space: nowrap;
}

.active {
  background: #333;
}

canvas {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: #000;
}
</style>
</head>

<body>

<header>WindView Clone</header>

<textarea id="input" placeholder="データ貼り付け"></textarea>
<button onclick="addData()">追加</button>

<div id="history"></div>

<canvas id="canvas"></canvas>

<script>

let history = [];
let currentIndex = 0;

// ===== パース（完全対応版）=====
function parse(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l);
  let result = [];

  for (let i = 0; i < lines.length; i++) {

    // 「mで終わる行だけ」処理（ヘッダー完全無視）
    if (/m$/.test(lines[i])) {

      let altLine = lines[i];

      let dir = parseFloat(lines[i + 1]);
      let speed = parseFloat(lines[i + 2]);

      if (isNaN(dir) || isNaN(speed)) continue;

      let alt;

      // 0-100m形式
      if (altLine.includes("-")) {
        const nums = altLine.match(/\d+/g);
        if (nums && nums.length === 2) {
          alt = (parseFloat(nums[0]) + parseFloat(nums[1])) / 2;
        } else {
          continue;
        }
      } 
      // - 1000m形式
      else {
        const num = altLine.match(/\d+/);
        if (!num) continue;
        alt = parseFloat(num[0]);
      }

      result.push({
        alt,
        dir,
        speed,
        heading: (dir + 180) % 360
      });
    }
  }

  return result.sort((a, b) => a.alt - b.alt);
}

// ===== データ追加 =====
function addData() {
  const text = document.getElementById("input").value;
  if (!text) return;

  const layers = parse(text);

  if (layers.length === 0) {
    alert("データが正しく読み取れません");
    return;
  }

  history.push({
    time: new Date().toLocaleTimeString(),
    layers
  });

  currentIndex = history.length - 1;

  renderHistory();
  draw();
}

// ===== 履歴UI =====
function renderHistory() {
  const el = document.getElementById("history");
  el.innerHTML = "";

  history.forEach((h, i) => {
    const div = document.createElement("div");
    div.className = "history-item " + (i===currentIndex?"active":"");
    div.innerText = h.time;
    div.onclick = ()=>{
      currentIndex = i;
      renderHistory();
      draw();
    };
    el.appendChild(div);
  });
}

// ===== 風速カラー =====
function getColor(speed) {
  if (speed < 5) return "#00aaff";
  if (speed < 10) return "#00ff88";
  if (speed < 15) return "#ffee00";
  if (speed < 20) return "#ff8800";
  return "#ff0000";
}

// ===== 描画 =====
function draw() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientWidth;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  // グリッド
  for(let r=40;r<=200;r+=40){
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI2);
    ctx.strokeStyle="#333";
    ctx.stroke();
  }

  // 方位
  ctx.fillStyle="#777";
  ctx.font = "12px Arial";
  ctx.fillText("N", cx-5, 12);
  ctx.fillText("E", canvas.width-15, cy);
  ctx.fillText("S", cx-5, canvas.height-5);
  ctx.fillText("W", 5, cy);

  const current = history[currentIndex];
  const prev = history[currentIndex-1];

  if(prev){
    drawPolar(ctx, prev.layers, cx, cy, true);
  }

  if(current){
    drawPolar(ctx, current.layers, cx, cy, false);
  }
}

// ===== 極座標描画 =====
function drawPolar(ctx, layers, cx, cy, isPrev){

  const scale = 6;

  for(let i=0;i<layers.length;i++){

    const d = layers[i];

    const angle = d.headingMath.PI/180;
    const r = d.speed*scale;

    const x = cx + Math.cos(angle)r;
    const y = cy + Math.sin(angle)r;

    let color = getColor(d.speed);

    if(isPrev){
      color = "rgba(150,150,150,0.2)";
    }

    // 線（主役）
    if(i>0){
      const prev = layers[i-1];
      const a2 = prev.headingMath.PI/180;
      const r2 = prev.speedscale;

      const x2 = cx + Math.cos(a2)*r2;
      const y2 = cy + Math.sin(a2)r2;

      ctx.beginPath();
      ctx.moveTo(x2,y2);
      ctx.lineTo(x,y);
      ctx.strokeStyle=color;
      ctx.lineWidth=3;
      ctx.stroke();
    }

    // 点（補助）
    ctx.beginPath();
    ctx.arc(x,y,4,0,Math.PI2);
    ctx.fillStyle=color;
    ctx.globalAlpha = 0.7;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

</script>

</body>
</html>
