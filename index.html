<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wind Polar Viewer</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

header {
  text-align: center;
  padding: 10px;
  background: #222;
  font-size: 18px;
}

textarea {
  width: 100%;
  height: 120px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  margin-top: 5px;
}

#history {
  display: flex;
  overflow-x: auto;
  border-bottom: 1px solid #333;
}

.history-item {
  padding: 10px;
  border-right: 1px solid #333;
  cursor: pointer;
  white-space: nowrap;
}

.active {
  background: #444;
}

canvas {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: black;
}
</style>
</head>

<body>

<header>Wind Polar Viewer</header>

<textarea id="input" placeholder="そのまま貼り付け"></textarea>
<button onclick="addData()">追加</button>

<div id="history"></div>

<canvas id="canvas"></canvas>

<script>

let history = [];
let currentIndex = 0;

function parse(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l);

  let result = [];

  for (let i = 0; i < lines.length; i++) {

    if (lines[i].includes("m")) {

      let altLine = lines[i];
      let dir = parseFloat(lines[i+1]);
      let speed = parseFloat(lines[i+2]);

      let min, max;

      if (altLine.includes("-")) {
        let parts = altLine.replace("m","").split("-");
        min = parseFloat(parts[0]);
        max = parseFloat(parts[1]);
      } else {
        let val = parseFloat(altLine.replace("m","").replace("-",""));
        min = val - 100;
        max = val;
      }

      let alt = (min + max) / 2;

      result.push({
        alt,
        dir,
        speed,
        heading: (dir + 180) % 360
      });
    }
  }

  return result;
}

function addData() {
  const text = document.getElementById("input").value;
  if (!text) return;

  const time = new Date().toLocaleTimeString();

  const layers = parse(text);

  history.push({ time, layers });
  currentIndex = history.length - 1;

  renderHistory();
  draw();
}

function renderHistory() {
  const el = document.getElementById("history");
  el.innerHTML = "";

  history.forEach((h, i) => {
    const div = document.createElement("div");
    div.className = "history-item " + (i === currentIndex ? "active" : "");
    div.innerText = h.time;
    div.onclick = () => {
      currentIndex = i;
      draw();
      renderHistory();
    };
    el.appendChild(div);
  });
}

function draw() {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientWidth;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // 円ガイド
  for (let r = 40; r <= 160; r += 40) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = "#333";
    ctx.stroke();
  }

  // 十字線
  ctx.beginPath();
  ctx.moveTo(cx, 0);
  ctx.lineTo(cx, canvas.height);
  ctx.moveTo(0, cy);
  ctx.lineTo(canvas.width, cy);
  ctx.strokeStyle = "#555";
  ctx.stroke();

  const current = history[currentIndex];
  const prev = history[currentIndex - 1];

  if (prev) {
    drawPolar(ctx, prev.layers, cx, cy, "gray");
  }

  if (current) {
    drawPolar(ctx, current.layers, cx, cy, "white");
  }
}

function drawPolar(ctx, layers, cx, cy, color) {

  const scale = 6;

  ctx.beginPath();

  layers.forEach((d, i) => {

    const angle = d.heading * Math.PI / 180;
    const r = d.speed * scale;

    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  // 点＋ラベル
  layers.forEach((d) => {
    const angle = d.heading * Math.PI / 180;
    const r = d.speed * scale;

    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;

    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    ctx.fillStyle = "#aaa";
    ctx.font = "10px Arial";
    ctx.fillText(d.alt + "m", x + 4, y);
  });
}

</script>

</body>
</html>
